  <script>
let lastSearchQuery = '';

/* =========================
   SEARCH INPUT
========================= */

function handleSearch(event) {
  if (event.key === 'Enter') performSearch();
}

function performSearch() {
  const input = document.getElementById('searchInput');
  if (!input) return;

  const query = input.value.trim();
  if (!query) return;

  lastSearchQuery = query.toLowerCase();
  showResults();
}

/* =========================
   RESULTS ENGINE
========================= */

function showResults() {
  const box = document.getElementById('browserContent');
  if (!box) return;

  let resultHTML = '';

  if (lastSearchQuery.includes("whiskersearch")) {
    resultHTML = resultCard(
      "WhiskerSearch Nedir?",
      "whiskersearch › about",
      "WhiskerSearch hakkında bilgi",
      "openInfo"
    );
  }

  else if (lastSearchQuery.includes("istatistik")) {
    resultHTML = resultCard(
      "Tıklanma İstatistikleri",
      "google › search-console",
      "Performans verileri",
      "openStats"
    );
  }

  else if (lastSearchQuery.includes("başarı")) {
    resultHTML = resultCard(
      "GSC Başarıları",
      "google › performance",
      "Sistem başarı raporu",
      "openSuccess"
    );
  }

  else if (lastSearchQuery.includes("business") || lastSearchQuery.includes("yorum")) {
    resultHTML = resultCard(
      "My Business",
      "google › business",
      "Yorumlar ve geri bildirimler",
      "openBusiness"
    );
  }

  else {
    resultHTML = resultCard(
      "404 - Bulunamadı",
      "error › 404",
      "Bu arama için sonuç yok",
      "open404"
    );
  }

  box.innerHTML = `
    <div class="results-container">
      ${resultHTML}
    </div>
  `;
}

/* =========================
   RESULT CARD
========================= */

function resultCard(title, url, desc, action) {
  return `
    <div class="result-item" onclick="${action}()">
      <div class="result-url">${url}</div>
      <div class="result-title">${title}</div>
      <div class="result-description">${desc}</div>
    </div>
  `;
}

/* =========================
   YOUR FULL PARAGRAPH PAGE
========================= */

function openInfo() {
  document.getElementById('browserContent').innerHTML = `
    <div style="padding:30px;">

      <h1>WhiskerSearch Nedir?</h1>

      <p>WhiskerSearch, sizi sahte bir arama motoruyla karşılayan, ancak tüm sonuçların ProfessorCat tarafından hazırlandığı interaktif bir deneyimdir.</p>

      <h2>Sahte Arama Motoru</h2>

      <p>Bu bölümde, sahte bir arama motoruyla karşılaşırsınız. Ne ararsanız arayın, sonuçlar ProfessorCat tarafından işlenmiştir. Görseller, videolar ve içerikler her zaman aynı kalır.</p>

      <h2>Sonuçlar</h2>

      <p>Çıkan sonuçlarda, hangi bağlantıya tıklarsanız tıklayın, sizi dört aşamalı bir oyuna yönlendirir.</p>

      <h3>Aşama 1: Ödev Desteği:</h3>

      <p>ProfessorCat, ödev, sınav ve word gibi akademik görevlerinizde size destek sunar.</p>

      <h3>Aşama 2: Çevre Koruma:</h3>

      <p>Burada ağaç dikme, sulama, atıkları ayırma, tabelaları onarma ve evdeki israfları bulma gibi görevler yer alır.</p>

      <h3>Aşama 3: Restoran Siparişi:</h3>

      <p>İlk olarak salata yaparken, sonraki aşamada hamburger, en sonunda ise pizza yaparsınız. Adımları sırasıyla takip edip puan kazanırsınız.</p>

      <h3>Aşama 4: Ev Düzenleme:</h3>

      <p>Salon, mutfak ve yatak odasını temizleyip düzenleyerek puan toplarsınız.</p>

      <h2>Görseller, Videolar ve Alışveriş</h2>

      <p>Bu kategorilerde, sahte kedi emojileri, videoları ve gerçek olmayan ürünler bulabilirsiniz. Yapay zekamız olan CatAI henüz Türkçe cümle kurmakta zorlanmakta, ancak matematiksel işlemlerinde başarılıdır. Daha gelişmiş bir AI deneyimi için WhiskerAI kullanabilirsiniz.</p>

      <button onclick="location.reload()">Geri</button>

    </div>
  `;
}
