  <script>
let lastSearchQuery = '';

function handleSearch(event) {
  if (event.key === 'Enter') performSearch();
}

function performSearch() {
  const input = document.getElementById('searchInput');
  if (!input) return;

  const query = input.value.trim();
  if (!query) return;

  lastSearchQuery = query.toLowerCase();
  showResults();
}

function showResults() {
  const box = document.getElementById('browserContent');
  if (!box) return;

  let resultHTML = '';

  if (lastSearchQuery.includes("whiskersearch")) {
    resultHTML = resultCard("WhiskerSearch Nedir?", "info › whiskersearch", "Hakkında sayfası", "openInfo");
  }

  else if (lastSearchQuery.includes("terminal")) {
    resultHTML = resultCard("Terminal Sistemi", "whiskersearch › terminal", "Terminal hakkında bilgi", "openTerminal");
  }

  else if (lastSearchQuery.includes("iletişim")) {
    resultHTML = resultCard("İletişim Sayfası", "whiskersearch › contact", "İletişim bilgileri", "openContact");
  }

  else if (lastSearchQuery.includes("feedback")) {
    resultHTML = resultCard("Feedback Sayfası", "whiskersearch › feedback", "Geri bildirim sistemi", "openFeedback");
  }

  else if (lastSearchQuery.includes("404")) {
    resultHTML = resultCard("404 Sayfası", "error › 404", "Hata sayfası", "open404");
  }

  else if (lastSearchQuery.includes("gsc") || lastSearchQuery.includes("istatistik")) {
    resultHTML = resultCard("WhiskerSearch – Google Search Console Verileri", "google › search console", "Performans verileri", "openStats");
  }

  else {
    resultHTML = resultCard("404 - Bulunamadı", "error › 404", "Sonuç yok", "open404");
  }

  box.innerHTML = `<div class="results-container">${resultHTML}</div>`;
}

function resultCard(title, url, desc, action) {
  return `
    <div class="result-item" onclick="${action}()">
      <div class="result-url">${url}</div>
      <div class="result-title">${title}</div>
      <div class="result-description">${desc}</div>
    </div>
  `;
}

<p>Slider farklı seviyelerde farklı geri bildirimler üretir:</p>

<p>* Yüksek puan: teşekkür ve olumlu mesajlar<br>* Orta puan: geliştirme önerileri<br>* Düşük puan: sistemin iyileştirilmesi gerektiğini belirten mesajlar</p>

<h2>Yorum Sistemi</h2>

<p>Kullanıcılar ayrıca yorum bırakabilir. Bu yorumlar puanla birlikte gönderilir.</p>

<p>Her kayıt şu bilgileri içerir:</p>

<p>* Yorum metni<br>* Verilen puan<br>* Tarih<br>* Saat</p>

<h2>Veri Toplama Sistemi</h2>

<p>Tüm geri bildirimler Google Tablolar (Google Sheets) üzerinde toplanır. Bu sistem Apps Script ile çalışır.</p>

<p>Yani kullanıcı bir yorum gönderdiğinde:</p>

<p>* Veri doğrudan Google Sheets’e düşer<br>* Otomatik olarak tabloya eklenir<br>* Tarih ve saat bilgisi de sistem tarafından eklenir</p>

<h2>Sonuç</h2>

<p>Feedback sayfası, WhiskerSearch’in kullanıcı deneyimini ölçen en önemli alanlardan biridir.</p>
