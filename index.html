<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhiskerSearch-ProfCat Grand Launch</title>
    <style>
        /* Modern ve Profesyonel UI Simülasyonu */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* En Üstteki Mor Geçişli Uyarı Çubuğu */
        .demo-banner {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-align: center;
            padding: 12px;
            font-size: 15px;
            font-weight: bold;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(118, 75, 162, 0.2);
        }

        /* Ana Arama Motoru Alanı */
        .search-container {
            max-width: 650px;
            margin: 60px auto 30px auto;
            text-align: center;
            padding: 20px;
        }

        .logo {
            font-size: 90px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .brand-name {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(45deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 25px;
        }

        .search-box-wrapper {
            position: relative;
        }

        .search-box {
            width: 100%;
            padding: 18px 28px;
            font-size: 18px;
            border: 2px solid #667eea;
            border-radius: 50px;
            outline: none;
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.15);
            transition: all 0.3s ease;
            box-sizing: border-box;
            background-color: white;
        }

        /* Dinamik Sonuç Alanı */
        .results-container {
            max-width: 750px;
            margin: 0 auto 100px auto;
            padding: 25px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            display: none;
        }

        .results-heading {
            font-size: 14px;
            color: #6c757d;
            margin-bottom: 20px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        /* Gerçekçi SEO Sonuç Kartları */
        .result-card {
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 12px;
            border: 1px solid #eef2f7;
            background: #fff;
            cursor: pointer;
            transition: all 0.25s ease;
            text-align: left;
        }

        .result-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.1);
            border-left: 5px solid #764ba2;
        }

        .result-url {
            font-size: 13px;
            color: #667eea;
            font-weight: 500;
        }

        .result-title {
            font-size: 20px;
            color: #06b6d4;
            font-weight: 600;
            margin: 6px 0;
        }

        .result-desc {
            font-size: 15px;
            color: #555;
            line-height: 1.5;
        }

        /* EKRANI KAPLAYAN DEVASA DETAY SUNUM SAYFALARI (MODAL) */
        .detail-page {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff;
            z-index: 1000;
            overflow-y: auto;
            padding: 60px 10%;
            box-sizing: border-box;
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        .close-btn {
            position: fixed;
            top: 30px; right: 5%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(118, 75, 162, 0.3);
            transition: all 0.2s;
            z-index: 1001;
        }

        .close-btn:hover { transform: scale(1.05); }

        /* Sunum İçerik Tasarımları */
        .sunum-header {
            font-size: 32px;
            font-weight: 800;
            color: #764ba2;
            margin-bottom: 30px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 15px;
            text-align: left;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: center;
            margin-top: 20px;
            text-align: left;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 25px;
            margin-top: 30px;
        }

        .sunum-img {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 2px solid #eef2f7;
        }

        .logo-img {
            height: 60px;
            object-fit: contain;
            margin-bottom: 15px;
        }

        .game-step {
            background: #fdf2e9;
            border-left: 5px solid #e67e22;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 0 12px 12px 0;
        }

        .tool-card {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid #e9ecef;
            transition: transform 0.2s;
        }

        .tool-card:hover { transform: translateY(-5px); }
        .tool-card h3 { color: #764ba2; margin-top: 10px; margin-bottom: 10px; }

        .reji-helper {
            position: fixed;
            bottom: 10px; right: 10px;
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 8px 15px;
            border-radius: 5px;
            font-size: 11px;
            font-family: monospace;
            pointer-events: none;
            z-index: 10000;
        }
    </style>
</head>
<body>

    <div class="demo-banner">🐱 PROFESSORCAT UYARISI: CANLI LANSMAN EKOSİSTEMİ AKTİF [cite: 19]</div>

    <div class="search-container">
        <div class="logo">🐱</div>
        <div class="brand-name">WhiskerSearch</div>
        <div class="search-box-wrapper">
            <input type="text" id="searchInput" class="search-box" placeholder="ProfessorCat'ta ara..." autocomplete="off" readonly>
        </div>
    </div>

    <div class="results-container" id="resultsContainer">
        <div class="results-heading" id="resultsHeading">ProfessorCat arama sonuçlarını listeledi...</div>
        <div id="resultsList"></div>
    </div>

    <div class="detail-page" id="detailPage">
        <button class="close-btn" onclick="closeDetail()">🔙 Arama Sonuçlarına Dön</button>
        <div id="detailContent"></div>
    </div>

    <div class="reji-helper">Reji Tuşları: 1, 2, 3, 4 | Alt Sayfalar: A, S, D, F</div>

    <script>
        const searchInput = document.getElementById('searchInput');
        const resultsContainer = document.getElementById('resultsContainer');
        const resultsHeading = document.getElementById('resultsHeading');
        const resultsList = document.getElementById('resultsList');
        const detailPage = document.getElementById('detailPage');
        const detailContent = document.getElementById('detailContent');

        const sunumData = {
            1: {
                query: "whiskersearch nedir",
                heading: "WhiskerSearch Nedir? & Gizli Yapay Zeka Modu",
                results: [
                    {
                        title: "Profesör Kedi'nin Dünyası ve Akıllı CatAI Asistanı 🐾",
                        url: "https://www.whiskersearch.com/about-catai",
                        desc: "Modern arama motorlarının o soğuk, sadece veri avlayan yapısına meydan okuyan; kedi personasıyla donatılmış interaktif bir web ekosistemi. Yapay zeka entegrasyonu ve kullanıcıyı içine çeken sürpriz oyun dinamikleri barındırır.",
                        action: "openStep1()"
                    }
                ]
            },
            2: {
                query: "whiskersearch diğer siteleri",
                heading: "'WhiskerSearch Diğer Siteleri' için 4 Büyük Sonuç Bulundu",
                results: [
                    { title: "💻 1. Sahte Terminal Ekosistemi", url: "https://terminal.whiskersearch.com", desc: "Bilgisayarla doğrudan ve aracısız konuşma dilimiz olan siyah ekran simülasyonu.", action: "openSubSite('terminal')" },
                    { title: "🤖 2. Cat-AI Yapay Zeka Arayüzü", url: "https://catai.whiskersearch.com", desc: "Profesör Kedi'nin akıllı asistanıyla anlık konuşabileceğiniz yapay zeka arayüz simülasyonu.", action: "openSubSite('catai')" },
                    { title: "📞 3. İletişim & Ağ Paneli (Contact)", url: "https://whiskersearch.com/contact", desc: "Geliştirici kimlik kartları ve ağ bağlantılarının merkezi yönetim alanı.", action: "openSubSite('contact')" },
                    { title: "⭐ 4. Değerlendirme & Yorum Paneli", url: "https://whiskersearch.com/review", desc: "Kullanıcıların sisteme bıraktığı anlık geri bildirimler ve puanlama paneli.", action: "openSubSite('review')" }
                ]
            },
            3: {
                query: "whiskersearch istatistikleri",
                heading: "Performans, Google Search Console ve My Business İstatistikleri",
                results: [
                    {
                        title: "Gerçek İnternet Ayak İzleri ve Başarı Tablosu 📈",
                        url: "https://console.whiskersearch.com/analytics",
                        desc: "WhiskerSearch-ProfCat'in Google indekslenme performansı, harita gösterimleri, kullanıcı tıklama oranları ve büyüme grafikleri.",
                        action: "openStep3()"
                    }
                ]
            },
            4: {
                query: "whiskersearch hangi araçlarla yapıldı",
                heading: "Geliştirme Mutfağı: Profesör Sahneler ve Altyapı Sponsorları",
                results: [
                    {
                        title: "Sistemin İnşa Edilmesini Sağlayan Yeni Nesil Profesyonel Platformlar 🛠️",
                        url: "https://github.com/ayse-create/mutfak",
                        desc: "Projenin sıfırdan zirveye taşınmasında kod bloklarını telafi eden, tasarımları uçuran vizyoner araçların analizi.",
                        action: "openStep4()"
                    }
                ]
            }
        };

        // REJİ KLAVYE TETİKLEME DİNLEYİCİSİ
        document.addEventListener('keydown', function(e) {
            const key = e.key.toUpperCase();

            if (sunumData[key]) {
                closeDetail();
                searchInput.value = sunumData[key].query;
                resultsContainer.style.display = 'block';
                resultsHeading.innerText = sunumData[key].heading;
                resultsList.innerHTML = '';

                sunumData[key].results.forEach(res => {
                    const card = document.createElement('div');
                    card.className = 'result-card';
                    card.innerHTML = `
                        <div class="result-url">${res.url}</div>
                        <div class="result-title">${res.title}</div>
                        <div class="result-desc">${res.desc}</div>
                    `;
                    card.setAttribute('onclick', res.action);
                    resultsList.appendChild(card);
                });
            }

            if (key === 'A') openSubSite('terminal');
            if (key === 'S') openSubSite('catai');
            if (key === 'D') openSubSite('contact');
            if (key === 'F') openSubSite('review');
        });

        // 1. AŞAMA SUNUM İÇERİĞİ: AI VE GİZLİ OYUN
        function openStep1() {
            detailContent.innerHTML = `
                <div class="sunum-header">🐾 WhiskerSearch Nedir & 4 Aşamalı Gizli Oyun Serüveni [cite: 7]</div>
                <div class="grid-2">
                    <div>
                        <p style="font-size:18px; line-height:1.6;"><b>Geleneksel Arama Motorlarına Eğlenceli Başkaldırı! [cite: 8]</b></p>
                        <p style="font-size:16px; color:#555; line-height:1.6;">WhiskerSearch, sadece statik bir web sayfası değildir; arka planda yapay zeka destekli <b>CatAI</b> modunu barındıren, kullanıcıyı aktif bir katılımcıya dönüştüren yaşayan bir simülasyondur. [cite: 7, 8]</p>
                        
                        <h3 style="color:#764ba2; margin-top:30px;">🎮 Keşfedilmeyi Bekleyen 4 Aşamalı Gizli Oyun</h3>
                        <div class="game-step"><b>Aşama 1: Kedi İllüzyonu Bulmacası</b> <br> <span style="font-size:14px; color:#666;">Kullanıcının karşısına çıkan ilk görsel bulmaca katmanı.</span></div>
                        <div class="game-step"><b>Aşama 2: Terminal Komut Şifresi</b> <br> <span style="font-size:14px; color:#666;">Sistem kodlarının manipüle edildiği gizli kod giriş aşaması.</span></div>
                        <div class="game-step"><b>Aşama 3: Mantık ve Algoritma Testi</b> <br> <span style="font-size:14px; color:#666;">Profesör Kedi'nin kullanıcıya yönelttiği yazılımsal zeka soruları.</span></div>
                        <div class="game-step"><b>Aşama 4: Final Karşılaşması</b> <br> <span style="font-size:14px; color:#666;">Tüm aşamaları geçen kullanıcının ekosisteme adını kazıdığı an!</span></div>
                    </div>
                    <div>
                        <img class="sunum-img" src="https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?fm=jpg&q=80&w=600" alt="Gözlüklü Profesör Kedi">
                        <p style="text-align:center; color:#888; font-size:13px; margin-top:10px;"><i>CatAI ve İnteraktif Oyun Arayüzü Temsili Canlı Görseli</i></p>
                    </div>
                </div>
            `;
            detailPage.style.display = 'block';
        }

        // 2. AŞAMA: 4 AYRI ALT SİTENİN DETAYLI SUNUMU
        function openSubSite(site) {
            if (site === 'terminal') {
                detailContent.innerHTML = `
                    <div class="sunum-header">💻 Proje 1: Sahte Terminal Ekosistemi</div>
                    <div class="grid-2">
                        <div>
                            <h3 style="color:#228be6;">Peki Ya Terminal Nedir?</h3>
                            <p style="font-size:17px; line-height:1.7; color:#444;">Terminal, bizim bilgisayarla aradaki tüm grafik arayüzleri kaldırarak, doğrudan ve aracısız konuşma dilimizdir! Yazılımcının klavyesidir.</p>
                            <p style="font-size:16px; color:#666; line-height:1.6;">Geliştirdiğim bu sahte terminal sitesinde kullanıcılar, gerçek komut satırı mimarisini deneyimleyerek sistemi komutlarla yönlendirebiliyor, web sitenin arkasındaki çekirdek mekanizmayı manipüle edebiliyorlar.</p>
                        </div>
                        <div>
                            <img class="sunum-img" src="https://images.unsplash.com/photo-1629654297299-c8506221ca97?fm=jpg&q=80&w=600" alt="Terminal Kod Ekranı">
                        </div>
                    </div>
                `;
            } else if (site === 'catai') {
                detailContent.innerHTML = `
                    <div class="sunum-header">🤖 Proje 2: Cat-AI Yapay Zeka Arayüzü [cite: 8]</div>
                    <div class="grid-2">
                        <div>
                            <img class="sunum-img" src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?fm=jpg&q=80&w=600" alt="Yapay Zeka Soyut Tasarım">
                        </div>
                        <div>
                            <h3 style="color:#764ba2;">Kedi Personasına Sahip Akıllı Asistan [cite: 8]</h3>
                            <p style="font-size:17px; line-height:1.7; color:#444;">Büyük dil modellerinin gücünü, esprili ve akademik bir kedi karakteriyle birleştiren bağımsız chat modülü. [cite: 8, 28]</p>
                            <p style="font-size:16px; color:#666; line-height:1.6;">Kullanıcılar arama yaparken sıkıldıkları an sağ alt köşedeki balona tıklayarak CatAI ile tamamen özgün, eğlenceli ve interaktif bir sohbet deneyimine geçiş yaparlar. [cite: 7, 22]</p>
                        </div>
                    </div>
                `;
            } else if (site === 'contact') {
                detailContent.innerHTML = `
                    <div class="sunum-header">📞 Proje 3: İletişim & Canlı Ağ Paneli (Contact)</div>
                    <div class="grid-2">
                        <div>
                            <h3 style="color:#06b6d4;">Ağa Bağlanma Noktası</h3>
                            <p style="font-size:17px; line-height:1.7; color:#444;">Kullanıcıların ve diğer geliştiricilerin ekosisteme dahil olabileceği, projeyi ileriye taşıyacak bağlantı kanallarının yönetildiği şık arayüz tasarımı.</p>
                        </div>
                        <div>
                            <img class="sunum-img" src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?fm=jpg&q=80&w=600" alt="Kartvizit ve İletişim">
                        </div>
                    </div>
                `;
            } else if (site === 'review') {
                detailContent.innerHTML = `
                    <div class="sunum-header">⭐ Proje 4: Değerlendirme & Canlı Yorum Paneli</div>
                    <div class="grid-2">
                        <div>
                            <img class="sunum-img" src="https://images.unsplash.com/photo-1521791136366-3e250171103b?fm=jpg&q=80&w=600" alt="Geri Bildirim Yıldızlar">
                        </div>
                        <div>
                            <h3 style="color:#e67e22;">Kullanıcı Deneyimi İzleme Paneli</h3>
                            <p style="font-size:17px; line-height:1.7; color:#444;">Sistemi ziyaret eden kullanıcıların bıraktığı anlık puanlamalar, yapıcı eleştiriler ve sistem performans verilerinin sergilendiği geri bildirim paneli.</p>
                        </div>
                    </div>
                `;
            }
            detailPage.style.display = 'block';
        }

        // 3. AŞAMA SUNUM İÇERİĞİ: GERÇEK İSTATİSTİKLER VE GOOGLE PROFILLERİ
        function openStep3() {
            detailContent.innerHTML = `
                <div class="sunum-header">📊 Gerçek Başarılar ve Canlı İnternet İstatistikleri</div>
                <p style="font-size:18px; color:#444;">Bu proje sadece yerel bir bilgisayarda dönen sanal bir tasarım değil; küresel internet ağında iz bırakan gerçek bir markadır! [cite: 1, 2]</p>
                <div class="grid-2">
                    <div>
                        <h3 style="color:#764ba2;">📈 Google Search Console Verileri</h3>
                        <p style="font-size:15px; color:#555; line-height:1.6;">Sitenin Google arama sonuçlarında indekslenmesiyle elde edilen organik gösterimler, tıklanma oranları (CTR) ve hedef anahtar kelimelerdeki yükseliş grafikleri projenin teknik SEO başarısını kanıtlıyor. [cite: 27]</p>
                        
                        <h3 style="color:#667eea; margin-top:30px;">🗺️ Google My Business (İşletme) Profili</h3>
                        <p style="font-size:15px; color:#555; line-height:1.6;">Haritalar ve Google arama sonuçları üzerinden kullanıcıların projeyi bulmasını sağlayan, altında gerçek kullanıcı yorumları ve 5 yıldızlı değerlendirmeler barındıran resmi işletme profili entegrasyonu.</p>
                    </div>
                    <div>
                        <img class="sunum-img" src="https://images.unsplash.com/photo-1551288049-bebda4e38f71?fm=jpg&q=80&w=600" alt="Yükseliş Analitik Grafiği">
                        <p style="text-align:center; color:#888; font-size:13px; margin-top:10px;"><i>Canlı Organik Performans Grafikleri ve Google İstatistik İzleri</i></p>
                    </div>
                </div>
            `;
            detailPage.style.display = 'block';
        }

        // 4. AŞAMA SUNUM İÇERİĞİ: MUTFAK (CANVA, GITHUB, AI LOGOLARIYLA)
        function openStep4() {
            detailContent.innerHTML = `
                <div class="sunum-header">🛠️ Teknolojik Mutfak ve Sektörel Güç Ortakları</div>
                <p style="font-size:18px; color:#444; margin-bottom:20px;">Bu devasa ekosistemi tek başıma ayağa kaldırırken, adeta arkamda devasa profesyonel sponsorlar varmışçasına kullandığım yeni nesil endüstriyel platformlar:</p>
                
                <div class="grid-3">
                    <div class="tool-card">
                        <img class="logo-img" src="https://www.vectorlogo.zone/logos/canva/canva-icon.svg" alt="Canva Logo">
                        <h3>1. Canva</h3>
                        <p style="font-size:14px; color:#555; line-height:1.5;">Kolay, esnek ve yüksek çözünürlüklü grafik tasarımları ile web sitesi görselleştirmeyi kod yazmadan bambaşka bir kreatif seviyeye çıkarıyor!</p>
                    </div>
                    <div class="tool-card">
                        <img class="logo-img" src="https://www.vectorlogo.zone/logos/github/github-icon.svg" alt="GitHub Logo">
                        <h3>2. GitHub & Copilot</h3>
                        <p style="font-size:14px; color:#555; line-height:1.5;">Repolar oluşturarak tüm kaynak dosyalarımı düzenli tutmamı, sürüm kontrolü yapmamı [cite: 4] ve Copilot yapay zekasıyla debugging (hata ayıklama) süreçlerini en hızlı seviyeye indirmemi sağlayan ana üs!</p>
                    </div>
                    <div class="tool-card">
                        <img class="logo-img" src="https://www.vectorlogo.zone/logos/openai/openai-icon.svg" alt="OpenAI Logo">
                        <h3>3. ChatGPT & Gemini</h3>
                        <p style="font-size:14px; color:#555; line-height:1.5;">Anlamadığım, mantık hatası yaptığım veya optimize edilmesi gereken parçalanmış kod bloklarımı hızla telafi etmemde ve tıkandığım anlarda bana yepyeni vizyoner fikirler sunmada en büyük kod ortağım!</p>
                    </div>
                </div>
                <div style="margin-top:40px;">
                    <img class="sunum-img" style="max-height: 250px; width: 100%; object-fit: cover;" src="https://images.unsplash.com/photo-1607799279861-4dd421887fb3?fm=jpg&q=80&w=1200" alt="Yazılım Geliştirme Kod Mutfağı">
                </div>
            `;
            detailPage.style.display = 'block';
        }

        function closeDetail() {
            detailPage.style.display = 'none';
        }
    </script>
</body>
</html>
